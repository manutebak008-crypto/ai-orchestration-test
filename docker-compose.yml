services:
  ai-agent:
    build: .
    container_name: ai-build-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres-db
    volumes:
      - .:/app

  postgres-db:
    image: postgres:15
    container_name: agent-postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: